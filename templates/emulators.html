{% extends "base.html" %}
{% block title %}Emulators{% endblock %}

{% block content %}
<h2>Emulators</h2>

<a href="{{ url_for('create_emulator') }}" class="btn btn-add">Add New Emulator</a>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Website</th>
            <th>Year</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
    {% for emu in emulators %}
        <tr>
            <td>{{ emu.name }}</td>
            <td><a href="{{ emu.link }}" target="_blank" class="btn btn-open">Open</a></td>
            <td>{{ emu.year }}</td>
            <td>
                <a href="{{ url_for('edit_emulator', emulator_id=emu.emulator_id) }}" class="btn btn-edit">Edit</a>
                <form action="{{ url_for('delete_emulator', emulator_id=emu.emulator_id) }}" method="post" class="inline" onsubmit="return confirm('Delete this emulator?');">
                    <input type="hidden" name="_method" value="DELETE">
                    <button type="submit" class="btn btn-delete">Delete</button>
                </form>
            </td>
        </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
